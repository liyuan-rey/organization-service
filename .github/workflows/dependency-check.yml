name: Dependency Update Check

on:
  schedule:
    # 每周一 9:00 UTC (17:00 GMT+8) 检查
    - cron: '0 9 * * 1'
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/build.gradle'
      - 'backend/gradle.properties'

jobs:
  dependency-update:
    name: Check for Dependency Updates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Check for dependency updates
        run: cd backend && ./gradlew dependencyUpdates --no-daemon

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-updates
          path: backend/build/dependencyUpdates/
          retention-days: 30

  vulnerabilities-scan:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Run OWASP Dependency Check
        run: cd backend && ./gradlew dependencyCheckAnalyze --no-daemon
        continue-on-error: true

      - name: Upload OWASP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: backend/build/reports/dependency-check-report.html
          retention-days: 30
